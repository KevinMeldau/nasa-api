<!DOCTYPE html>
<html lang="en">
  <head>
    <title>NASA API - Kevin Meldau</title>
    <meta name="description" content="NASA API" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      media="all"
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" media="screen" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="gradient">
        <p class="text-vertical">I want to believe...</p>
        <i class="fa fa-caret-right"></i>
        <div class="border">
          <div class="title-container">
            <div class="dropdown">
              <div class="img-container">
                <img src="images/nasa-logo-web-rgb.png" alt="NASA logo" />
              </div>
              <div class="dropdown-content">
                <ul>
                  <li><a id="imageOfTheDay">Astronomy Picture of the Day</a></li>
                  <li><a id="marsImages">Mars Rover Photos</a></li>
                </ul>
              </div>
            </div>
          </div>
          <div class="outer-content-container">
            <div class="inner-content-container">
              <i class="fa fa-caret-left" id="previous"></i>
              <div class="main-image-container">
                <img id="photo-of-the-day" class="photo-of-the-day" src="" alt="NASA Photo of the Day"/></div>
              <i class="fa fa-caret-right" id="next"></i>
            </div>
          </div>
          <p class="text-vertical-bottom">Do you believe?</p>
        </div>
      </div>
    </div>
    <script type="text/javascript" src="index.js"></script>
  </body>
</html>
